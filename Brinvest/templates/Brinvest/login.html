{% extends "Brinvest/layout.html" %}

{% block body %}
    <div class="login-container full-center">
        <div class="login-box">
            <h2 style="text-align: center; padding-bottom: 30px;">Login</h2>

            {% if message %}
                <div class="alert alert-warning">{{ message }}</div>
            {% endif %}

            <form class="login" action="{% url 'login' %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <input style="border-radius: 0px;" autofocus class="form-control" type="text" name="username" placeholder="Username">
                </div>
                <div class="form-group">
                    <input style="border-radius: 0px;" class="form-control" type="password" name="password" placeholder="Password">
                </div>
                <input style="background-color: gray; border-radius: 0px;" class="btn btn-primary btn-block" type="submit" value="Login">
            </form>

            <div class="mt-3">Don't have an account? <a href="{% url 'register' %}">Register here.</a></div>
        </div>
    </div>

{% endblock %}
