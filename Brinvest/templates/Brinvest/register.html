{% extends "Brinvest/layout.html" %}

{% block body %}
    <div class="login-container full-center">
        <div class="login-box">
            <h2 style="text-align: center; padding-bottom: 30px;">Register</h2>

            {% if message %}
                <div class="alert alert-warning">{{ message }}</div>
            {% endif %}

            <form action="{% url 'register' %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <input style="border-radius: 0px;" class="form-control" autofocus type="text" name="username" placeholder="Username">
                </div>
                <div class="form-group">
                    <input style="border-radius: 0px;" class="form-control" type="email" name="email" placeholder="Email Address">
                </div>
                <div class="form-group">
                    <input style="border-radius: 0px;" class="form-control" type="password" name="password" placeholder="Password">
                </div>
                <div class="form-group">
                    <input style="border-radius: 0px;" class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
                </div>
                <input style="background-color: gray; border-radius: 0px;" class="btn btn-primary btn-block" type="submit" value="Register">
            </form>

            <div class="mt-3">Already have an account? <a href="{% url 'login' %}">Log In here.</a></div>
        </div>
    </div>

{% endblock %}
